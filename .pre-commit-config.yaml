# Pre-commit hooks — quality gates (ruff, security) run on every commit.
# Project-agnostic: copy as-is into any project using the shared kit.
#
# Pytest is intentionally NOT included to keep pre-commit fast; tests must
# still be run manually per AGENTS.md (real execution in terminal).
#
# Update hook revisions with: pre-commit autoupdate
repos:
  # Linter + formatter (replaces black + flake8 + isort).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # General-purpose safety + hygiene hooks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
