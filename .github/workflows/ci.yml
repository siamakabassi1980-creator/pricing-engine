# CI pipeline — second line of defense (per constitution).
# Pre-commit is bypassable with --no-verify; CI is not.
#
# This workflow runs the same quality gates as local pre-commit, plus the
# full test suite and the independent per-module coverage gate. It is the
# authoritative gate: if it passes here, the code is releasable.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      # CI has no real DeepSeek key. allow_dummy_fallback is the explicit
      # opt-in flag (ADR-0001 security addendum): safe because CI never
      # serves real customers. Without this, create_app() refuses to start.
      ALLOW_DUMMY_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --strict app/

      - name: Test suite (full)
        run: pytest -q

      - name: Coverage gate (independent per-module)
        run: bash scripts/check_coverage.sh

      - name: Dependency audit
        run: pip-audit -r requirements.txt
